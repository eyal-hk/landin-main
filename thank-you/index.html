<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה! – HK Money</title>
  <link rel="icon" href="../images/hkmoney_favicon.png" type="image/png">
  <link rel="stylesheet" href="../style.css">
  <style>
    .thankyou-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .thankyou-card {
      max-width: 580px;
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px;
      padding: 3.5rem 3rem;
    }
    .thankyou-card img { height: 52px; margin-bottom: 2rem; }
    .thankyou-card h1 { font-size: 2.2rem; margin-bottom: 1rem; }
    .thankyou-card h1 span { color: var(--coral); }
    .thankyou-card p { font-size: 1.05rem; margin-bottom: 1.5rem; }
    .thankyou-card .btn { margin-top: .5rem; }
  </style>
</head>
<body>
  <div class="thankyou-wrap">
    <div class="thankyou-card">
      <img src="../images/HKMoney_logo.webp" alt="HK Money">
      <h1>השארת לנו את הפרטים שלך <span>בהצלחה!</span></h1>
      <p>עשית את הצעד הראשון כדי להעלות את הרווחיות שלך בעסק.</p>
      <p>אנחנו נחזור אליך בהקדם לשיחה קצרה — ללא עלות וללא התחייבות.</p>
      <a href="/" class="btn btn-coral">חזרה לעמוד הראשי</a>
    </div>
  </div>
</body>
</html>
